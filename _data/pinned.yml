- content: >
    **I am seeking 2 highly motivated PhD students** (starting Fall 2027) to join my research
    group at the intersection of urban mobility and artificial intelligence. A Transportation background is
    valued, but students from Computer Science, Applied Mathematics, or Engineering are equally
    encouraged to apply. Coding or agentic-engineering skills are important. If you are
    excited about how AI can reshape urban mobility, please email me your CV, transcripts, and a brief statement of research interests.